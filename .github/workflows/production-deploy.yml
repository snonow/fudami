name: Production Deployment Gateway

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test -- --watchAll=false

      - name: Build Web App
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          EXPO_PUBLIC_GOOGLE_TTS_KEY: ${{ secrets.EXPO_PUBLIC_GOOGLE_TTS_KEY }}
          EXPO_PUBLIC_FUDAMI_PACK_KEY: ${{ secrets.FUDAMI_PACK_KEY }}

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: fudami
          directory: dist
          # Force production environment
          branch: main
