name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois — annule le précédent si un nouveau push arrive
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          npm ci || npm ci || npm ci

      # Injecte la clé Clerk depuis GitHub Secrets
      - name: Inject environment variables
        env:
          CLERK_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          FUDAMI_PACK_KEY: ${{ secrets.FUDAMI_PACK_KEY }}
        run: |
          echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY" > .env.local
          printf 'export const PACK_KEY = "%s";\n' "$FUDAMI_PACK_KEY" > constants/packKey.ts

      # TTS key : null pour le web (fallback sur expo-speech)
      - name: Create TTS key placeholder
        run: |
          echo 'export const GOOGLE_TTS_KEY: string | null = null;' > constants/ttsKey.ts

      - name: Export web build
        run: npx expo export --platform web

      - name: Create .nojekyll
        run: touch dist/.nojekyll

      - name: Create 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
